<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PES League - Firebase Fixed Edition</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #1a2a6c; --secondary: #b21f1f; --accent: #fdbb2d; --light: #f4f4f9; --dark-blue: #0f1a45; --purple: #6a0dad; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: linear-gradient(145deg, #270668 0%, #5d15a3 40%, #270668 100%);
            background-attachment: fixed;
            color: #333; 
            margin: 0; 
            min-height: 100vh;
        }
        
        .landing-page {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(145deg, #270668 0%, #5d15a3 40%, #270668 100%);
            z-index: 10000; display: flex; flex-direction: column;
            justify-content: center; align-items: center; color: white;
            transition: opacity 0.5s ease;
        }
        .landing-page h1 { font-size: 3rem; text-shadow: 3px 3px 10px rgba(0,0,0,0.5); text-align: center; margin-bottom: 5px; }
        .landing-page p { font-size: 1.2rem; color: #ddd; margin-bottom: 40px; }
        
        .mode-cards { display: flex; gap: 30px; flex-wrap: wrap; justify-content: center; padding: 20px; }
        .mode-card {
            background: rgba(255, 255, 255, 0.05); border: 2px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px); padding: 50px 30px; border-radius: 20px;
            cursor: pointer; transition: all 0.3s ease; text-align: center; width: 220px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .mode-card:hover {
            background: var(--accent); color: var(--primary);
            border-color: var(--accent); transform: translateY(-10px) scale(1.05);
            box-shadow: 0 15px 40px rgba(253, 187, 45, 0.4);
        }
        .mode-card h2 { margin: 0; font-size: 2.5rem; }
        .mode-card span { display: block; font-size: 1rem; margin-top: 10px; font-weight: bold; opacity: 0.9; }

        .main-wrapper { 
            display: none; 
            grid-template-columns: 1fr 340px; gap: 20px; max-width: 1300px; margin: auto; padding: 20px; 
        }
        .main-wrapper.active { display: grid; }
        
        .container { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 8px 25px rgba(0,0,0,0.3); overflow-x: auto; }
        
        .sidebar { height: fit-content; max-height: calc(100vh - 40px); overflow-y: auto; position: sticky; top: 20px; display: flex; flex-direction: column; gap: 20px; padding-right: 5px; }
        .sidebar::-webkit-scrollbar { width: 6px; }
        .sidebar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3); border-radius: 3px; }
        
        .sidebar-card { background: var(--primary); color: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .sidebar-card.all-time { background: var(--dark-blue); border: 1px solid var(--accent); }
        .nav-months { display: flex; justify-content: center; gap: 5px; margin-bottom: 20px; flex-wrap: wrap; }
        .nav-months button { padding: 8px 12px; border-radius: 20px; border: 1px solid #ddd; background: white; cursor: pointer; transition: 0.2s; }
        .nav-months button.active { background: var(--accent); color: var(--primary); font-weight: bold; transform: scale(1.05); }
        .champion-banner { text-align: center; font-size: 1.3rem; color: var(--secondary); font-weight: 900; margin-bottom: 20px; padding: 15px; border: 3px solid var(--accent); border-radius: 12px; background: #fffde6; line-height: 1.5; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        .date-section { margin-bottom: 40px; border-top: 5px solid var(--primary); padding-top: 20px; }
        .date-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; flex-wrap: wrap; gap: 10px; }
        
        .standings-title { font-size: 1.1rem; font-weight: 900; color: #444; margin-bottom: 10px; border-left: 5px solid var(--purple); padding-left: 10px; letter-spacing: 1px; }

        .main-table { width: 100%; border-collapse: separate; border-spacing: 0; min-width: 600px; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .main-table th { background-color: var(--purple); color: white; padding: 12px 8px; text-align: center; font-size: 0.95rem; }
        .main-table td { padding: 8px; text-align: center; border-bottom: 1px solid #eee; font-size: 0.95rem; }
        .winner-row { background-color: #fff9c4 !important; font-weight: bold; }
        
        .total-table { width: 100%; margin-top: 10px; border-collapse: collapse; min-width: 100%; }
        .total-table th { color: #aaa; font-size: 0.7rem; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 8px; }
        .total-table td { border-bottom: 1px solid rgba(255,255,255,0.1); padding: 12px 5px; }
        
        .btn-add { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 10px; cursor: pointer; width: 100%; margin-top: 10px; font-weight: bold; }
        .btn-logout { background: #666; color: white; border: none; padding: 10px; border-radius: 10px; cursor: pointer; width: 100%; margin-top: 10px; }
        
        .btn-switch-mode {
            background: rgba(255, 255, 255, 0.15); border: 1px solid white; color: white;
            border-radius: 20px; padding: 6px 15px; cursor: pointer; font-weight: bold;
            transition: 0.3s; display: flex; align-items: center; gap: 5px;
        }
        .btn-switch-mode:hover { background: var(--accent); color: var(--primary); border-color: var(--accent); }

        .player-selector { margin: 10px 0; padding: 15px; border: 2px dashed var(--primary); border-radius: 10px; background: #f0f4ff; color: #333; }
        .league-order-badge { background: var(--secondary); color: white; padding: 2px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: bold; margin-left: 10px; }
        
        input[type="number"] { width: 35px; text-align: center; padding: 3px; border: 1px solid #ccc; border-radius: 4px; }
        .col-pts { font-size: 1.15rem; font-weight: 900; color: var(--primary); border-left: 1px solid #eee; border-right: 1px solid #eee; }

        /* KLASEMEN EPL STYLE */
        .glb-table { width: 100%; border-collapse: collapse; min-width: 600px; margin-top: 10px; }
        .glb-table th { padding: 15px 10px; color: #8f959b; font-weight: normal; font-size: 0.85rem; text-align: center; border-bottom: 1px solid #e2e6ea; }
        .glb-table th.align-left { text-align: left; }
        .glb-table td { padding: 12px 10px; color: #242424; font-size: 0.95rem; text-align: center; border-bottom: 1px solid #f0f0f0; vertical-align: middle; }
        .glb-table td.align-left { text-align: left; font-weight: bold; font-size: 1.05rem; display: flex; align-items: center; gap: 10px; }
        .glb-pos { display: inline-block; width: 25px; font-weight: bold; color: #242424; text-align: center; }
        .glb-blue-bar { border-left: 4px solid #1a2a6c; padding-left: 10px; }
        .glb-pts { font-weight: 900; font-size: 1.15rem; color: #1a2a6c; }
        .glb-form-container { display: flex; gap: 4px; justify-content: center; align-items: center; }
        .form-circle { width: 22px; height: 22px; border-radius: 50%; display: flex; justify-content: center; align-items: center; color: white; font-size: 0.65rem; font-weight: bold; }
        .form-w { background-color: #1b994b; }
        .form-d { background-color: #a3a3a3; }
        .form-l { background-color: #d32f2f; }
        .player-icon { width: 26px; height: 26px; background: #f4f4f9; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 0.8rem; border: 1px solid #eee; }

        @media (max-width: 900px) { 
            .main-wrapper.active { display: flex; flex-direction: column; } 
            .sidebar { position: static; order: 2; } 
            .container { order: 1; } 
            .landing-page h1 { font-size: 2.2rem; }
        }
    </style>
</head>
<body>

<div id="landingPage" class="landing-page">
    <h1>SUNDAY PES LEAGUE</h1>
    <p>Pilih format liga hari ini</p>
    <div class="mode-cards">
        <div class="mode-card" onclick="setMode('3')">
            <h2>3 Player</h2>
            <span>Mode Rotasi Pemain</span>
        </div>
        <div class="mode-card" onclick="setMode('4')">
            <h2>4 Player</h2>
            <span>Mode Klasik Penuh</span>
        </div>
    </div>
</div>

<div id="mainWrapper" class="main-wrapper">
    <div class="container">
        
        <div style="text-align: center; margin-bottom: 25px;">
            <h1 onclick="cekAdmin()" style="cursor:default; font-size: 1.5rem; color: #ffffff; text-shadow: 2px 2px 5px rgba(0,0,0,0.5); user-select: none; margin-top: 0; background: var(--primary); padding: 10px; border-radius: 10px; display: inline-block;">SUNDAY PES LEAGUE</h1>
            
            <div style="margin-top: 15px; display: flex; justify-content: center; align-items: center; gap: 10px;">
                <span id="currentModeBadge" style="background: var(--accent); color: var(--primary); padding: 6px 15px; border-radius: 20px; font-weight: bold; font-size: 0.9rem;">Mode Aktif</span>
                <button onclick="kembaliKeMenuAwal()" class="btn-switch-mode">🔄 Ganti Mode</button>
            </div>
        </div>

        <div class="nav-months" id="monthNav"></div>
        <div id="championArea" class="champion-banner">MENGHUBUNGKAN...</div>
        
        <div id="mainContent"></div>
        <div id="adminTools"></div>
    </div>

    <div class="sidebar">
        <div class="sidebar-card">
            <h3 id="monthlyTitle" style="text-align: center; margin-top: 0; color: var(--accent); font-size: 1rem;">📊 TOTAL POIN</h3>
            <table class="total-table">
                <thead><tr><th style="text-align: left;">PLAYER</th><th>Wins</th><th>Points</th></tr></thead>
                <tbody id="totalPointsBody"></tbody>
            </table>
        </div>
        
        <div class="sidebar-card all-time">
            <h3 style="text-align: center; margin-top: 0; color: white; font-size: 1rem;">🏆 ALL TIME POINTS</h3>
            <table class="total-table">
                <thead><tr><th style="text-align: left;">PLAYER</th><th>Wins</th><th>Points</th></tr></thead>
                <tbody id="allTimePointsBody"></tbody>
            </table>
        </div>

        <div class="sidebar-card all-time">
            <h3 style="text-align: center; margin-top: 0; color: white; font-size: 1rem;">⚽ TOP SCORES</h3>
            <table class="total-table">
                <thead><tr><th style="text-align: left;">PLAYER</th><th>Wins</th></tr></thead>
                <tbody id="topScoresBody"></tbody>
            </table>
        </div>

        <div class="sidebar-card all-time">
            <h3 style="text-align: center; margin-top: 0; color: white; font-size: 1rem;">🎯 TOP ASSISTS</h3>
            <table class="total-table">
                <thead><tr><th style="text-align: left;">PLAYER</th><th>Wins</th></tr></thead>
                <tbody id="topAssistsBody"></tbody>
            </table>
            <div id="adminStatsTool"></div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyAXi0FIoDjcR9HUWQ7NuAiOUsD68X8vibA",
      authDomain: "liga-pes-b3bd0.firebaseapp.com",
      databaseURL: "https://liga-pes-b3bd0-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "liga-pes-b3bd0",
      storageBucket: "liga-pes-b3bd0.firebasestorage.app",
      messagingSenderId: "673104038654",
      appId: "1:673104038654:web:9da7efde3520577b05b3af",
      measurementId: "G-2RP64MH07H"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const months = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
    const allPlayers = ["Toxx", "Ipo", "Alfa", "Kobe"];
    let currentMonth = localStorage.getItem('activeMonth') || "Mei"; 
    
    let currentMode = null; 
    let dbPath = 'liga'; // Berubah sesuai mode yang dipilih
    let matchesRef = null;
    let statsRef = null;

    let modeAdmin = false;
    let editingMatchId = null;
    let localData = {};
    let statsData = {};
    let sedangEditStats = false;
    
    let activePlayersInMode = new Set(); 

    function filterName(name) { return name === "Ito" ? "Toxx" : (name || "Unknown"); }

    function setMode(mode) {
        currentMode = mode;
        document.getElementById('landingPage').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('landingPage').style.display = 'none';
            document.getElementById('mainWrapper').classList.add('active');
            terapkanMode();
        }, 500); 
    }

    function kembaliKeMenuAwal() {
        if (matchesRef) matchesRef.off();
        if (statsRef) statsRef.off();
        document.getElementById('mainWrapper').classList.remove('active');
        document.getElementById('landingPage').style.display = 'flex';
        setTimeout(() => { document.getElementById('landingPage').style.opacity = '1'; }, 10);
    }

    function terapkanMode() {
        // PEMISAHAN DATABASE TOTAL
        dbPath = currentMode === '3' ? 'liga3' : 'liga';
        document.getElementById('currentModeBadge').innerText = `🔥 Mode ${currentMode} Player Aktif`;
        
        editingMatchId = null;
        sedangEditStats = false;
        renderNav();
        ambilData();
        listenStats();
    }

    function listenStats() {
        if (statsRef) statsRef.off();
        statsRef = db.ref(dbPath + '/allTimeStats');
        statsRef.on('value', (snapshot) => {
            let rawStats = snapshot.val() || {};
            statsData = {};
            allPlayers.forEach(p => statsData[p] = { score: 0, assist: 0 });
            Object.keys(rawStats).forEach(key => {
                let cleanKey = filterName(key);
                if (!statsData[cleanKey]) statsData[cleanKey] = { score: 0, assist: 0 };
                statsData[cleanKey].score += rawStats[key].score || 0;
                statsData[cleanKey].assist += rawStats[key].assist || 0;
            });
            renderStats();
        });
    }

    function cekAdmin() {
        window.klik = (window.klik || 0) + 1;
        if(window.klik >= 5) { 
            modeAdmin = true; 
            alert(`Mode Admin Aktif!`); 
            renderAdminTools(); 
            ambilData(); 
            renderStats();
        }
    }

    function matikanAdmin() { 
        modeAdmin = false; 
        editingMatchId = null; 
        sedangEditStats = false; 
        document.getElementById('adminTools').innerHTML = ""; 
        ambilData(); 
        renderStats();
    }

    function renderStats() {
        if(sedangEditStats) return;
        
        let playersToRender = new Set([...Array.from(activePlayersInMode)]);
        Object.keys(statsData).forEach(p => {
            if (statsData[p].score > 0 || statsData[p].assist > 0) playersToRender.add(p);
        });
        
        const displayList = modeAdmin ? allPlayers : (playersToRender.size > 0 ? Array.from(playersToRender) : allPlayers);
        
        const sortedScores = [...displayList].sort((a,b) => statsData[b].score - statsData[a].score);
        document.getElementById('topScoresBody').innerHTML = sortedScores.map((n, i) => 
            `<tr><td style="text-align:left;">${i==0 && statsData[n].score>0?'🥇':''} ${n}</td><td style="font-weight:bold;">${statsData[n].score}x</td></tr>`
        ).join('');

        const sortedAssists = [...displayList].sort((a,b) => statsData[b].assist - statsData[a].assist);
        document.getElementById('topAssistsBody').innerHTML = sortedAssists.map((n, i) => 
            `<tr><td style="text-align:left;">${i==0 && statsData[n].assist>0?'🥇':''} ${n}</td><td style="font-weight:bold;">${statsData[n].assist}x</td></tr>`
        ).join('');

        if(modeAdmin) {
            document.getElementById('adminStatsTool').innerHTML = `<button onclick="editStats()" style="width:100%; margin-top:15px; padding:10px; border-radius:8px; border:none; background:#fdbb2d; font-weight:bold; cursor:pointer; color:#1a2a6c;">✏️ Edit Manual Stats</button>`;
        } else {
            document.getElementById('adminStatsTool').innerHTML = '';
        }
    }

    function editStats() {
        sedangEditStats = true;
        document.getElementById('topScoresBody').innerHTML = allPlayers.map(n => 
            `<tr><td style="text-align:left;">${n}</td><td><input type="number" id="edit-score-${n}" value="${statsData[n].score}" style="width:45px; text-align:center; padding:3px; border-radius:4px; border:1px solid #ccc;"></td></tr>`
        ).join('');

        document.getElementById('topAssistsBody').innerHTML = allPlayers.map(n => 
            `<tr><td style="text-align:left;">${n}</td><td><input type="number" id="edit-assist-${n}" value="${statsData[n].assist}" style="width:45px; text-align:center; padding:3px; border-radius:4px; border:1px solid #ccc;"></td></tr>`
        ).join('');

        document.getElementById('adminStatsTool').innerHTML = `<button onclick="simpanStats()" style="width:100%; margin-top:15px; padding:10px; border-radius:8px; border:none; background:#4CAF50; color:white; font-weight:bold; cursor:pointer;">💾 Simpan Stats</button>`;
    }

    function simpanStats() {
        let newData = {};
        allPlayers.forEach(n => {
            newData[n] = {
                score: parseInt(document.getElementById(`edit-score-${n}`).value) || 0,
                assist: parseInt(document.getElementById(`edit-assist-${n}`).value) || 0
            };
        });
        db.ref(dbPath + '/allTimeStats').set(newData).then(() => { sedangEditStats = false; });
    }

    function renderAdminTools() {
        if(modeAdmin) {
            if (currentMonth === 'ALL TIME STANDING') {
                document.getElementById('adminTools').innerHTML = `
                    <p style="text-align:center; color:red; font-weight:bold; background:white; padding:10px; border-radius:8px;">Pilih salah satu bulan terlebih dahulu untuk membuat liga baru!</p>
                    <button class="btn-logout" onclick="matikanAdmin()">🔒 MATIKAN MODE ADMIN</button>
                `;
                return;
            }
            document.getElementById('adminTools').innerHTML = `
                <div class="player-selector">
                    <strong>Pilih Pemain & Tanggal (Wajib Ceklis ${currentMode} Pemain):</strong><br>
                    <div style="margin: 10px 0;">
                        ${allPlayers.map(p => `<label style="margin-right:10px;"><input type="checkbox" class="p-check" value="${p}" checked> ${p}</label>`).join('')}
                    </div>
                    <select id="newLeagueDate" style="width: 100%; padding: 8px; margin-bottom: 10px;">
                        ${Array.from({length: 31}, (_, i) => `<option value="${i+1}">Tanggal ${i+1}</option>`).join('')}
                    </select>
                    <button class="btn-add" onclick="tambahKlasemenBaru()">➕ BUAT LIGA</button>
                </div>
                <button class="btn-logout" onclick="matikanAdmin()">🔒 MATIKAN MODE ADMIN</button>
            `;
        }
    }

    // UPDATE FUNGSI TAMBAH LIGA DENGAN ERROR CATCHER
    function tambahKlasemenBaru() {
        const selected = Array.from(document.querySelectorAll('.p-check:checked')).map(cb => cb.value);
        const tgl = document.getElementById('newLeagueDate').value;
        
        const targetCount = parseInt(currentMode);
        if(selected.length !== targetCount) {
            return alert(`Mode ${currentMode} Player Aktif: Silakan centang TEPAT ${targetCount} nama pemain!`);
        }
        
        const newMatchRef = db.ref(dbPath + '/' + currentMonth + '/matches').push();
        newMatchRef.set({
            tanggal: parseInt(tgl),
            timestamp: Date.now(),
            standings: selected.map((n, index) => ({ name: n, w: 0, d: 0, l: 0, f: 0, a: 0, gd: 0, pts: 0, manualRank: index + 1 }))
        }).then(() => {
            renderAdminTools();
            alert("✅ Liga berhasil dibuat!");
        }).catch((error) => {
            console.error(error);
            alert("❌ Gagal membuat liga! Pastikan Firebase Rules kamu sudah diganti menjadi true. Error: " + error.message);
        });
    }

    function renderNav() {
        let html = months.map(m => 
            `<button class="${m === currentMonth ? 'active' : ''}" onclick="gantiBulan('${m}')">${m}</button>`
        ).join('');
        html += `<button class="${currentMonth === 'ALL TIME STANDING' ? 'active' : ''}" onclick="gantiBulan('ALL TIME STANDING')" style="font-weight: 900; border-color: var(--purple);">ALL TIME STANDING</button>`;
        document.getElementById('monthNav').innerHTML = html;
    }

    function gantiBulan(m) {
        currentMonth = m;
        if (m !== 'ALL TIME STANDING') localStorage.setItem('activeMonth', m);
        editingMatchId = null;
        renderNav();
        ambilData();
        renderAdminTools();
    }

    function ambilData() {
        if (currentMonth === 'ALL TIME STANDING') {
            document.getElementById('monthlyTitle').innerText = "📊 ALL TIME STANDING";
            document.getElementById('championArea').style.display = 'none'; 
            if (matchesRef) matchesRef.off();
            renderEPLStyleAllTimeStanding(); 
            return;
        }

        document.getElementById('championArea').style.display = 'block'; 
        document.getElementById('monthlyTitle').innerText = "📊 TOTAL POIN " + currentMonth.toUpperCase();
        
        if (matchesRef) matchesRef.off();
        matchesRef = db.ref(dbPath + '/' + currentMonth + '/matches');
        matchesRef.on('value', (snapshot) => {
            if (editingMatchId) return;
            localData = snapshot.val() || {};
            renderUlang(localData);
            updateAllTimePointsAndStatus(localData); 
        });
    }

    function renderEPLStyleAllTimeStanding() {
        db.ref(dbPath).once('value', (snapshot) => {
            let modeStats = {};
            allPlayers.forEach(p => {
                modeStats[p] = { pl:0, w:0, d:0, l:0, gf:0, ga:0, gd:0, pts:0, form:[] };
            });

            let allMatches = [];
            let rootData = snapshot.val() || {};
            
            months.forEach(m => {
                if (rootData[m] && rootData[m].matches) {
                    Object.values(rootData[m].matches).forEach(match => {
                        if (match && match.standings && Array.isArray(match.standings)) {
                            allMatches.push(match);
                        }
                    });
                }
            });

            allMatches.sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));

            allMatches.forEach(match => {
                match.standings.forEach(p => {
                    let cleanName = filterName(p.name);
                    if (!modeStats[cleanName]) return;

                    let w = parseInt(p.w) || 0; let d = parseInt(p.d) || 0; let l = parseInt(p.l) || 0;
                    let f = parseInt(p.f) || 0; let a = parseInt(p.a) || 0; let pts = parseInt(p.pts) || 0;

                    modeStats[cleanName].pl += (w + d + l);
                    modeStats[cleanName].w += w;
                    modeStats[cleanName].d += d;
                    modeStats[cleanName].l += l;
                    modeStats[cleanName].gf += f;
                    modeStats[cleanName].ga += a;
                    modeStats[cleanName].gd += (f - a);
                    modeStats[cleanName].pts += pts;

                    for(let k=0; k<w; k++) modeStats[cleanName].form.push('W');
                    for(let k=0; k<d; k++) modeStats[cleanName].form.push('D');
                    for(let k=0; k<l; k++) modeStats[cleanName].form.push('L');
                });
            });

            let sortedData = Object.keys(modeStats).map(name => {
                return { name: name, ...modeStats[name] };
            }).sort((a, b) => {
                if (b.pts !== a.pts) return b.pts - a.pts;
                if (b.gd !== a.gd) return b.gd - a.gd;
                return b.gf - a.gf;
            });

            sortedData = sortedData.filter(p => p.pl > 0);

            if (sortedData.length === 0) {
                document.getElementById('mainContent').innerHTML = `<p style="text-align:center; color:white; margin-top:30px; font-size:1.2rem; background:rgba(0,0,0,0.3); padding:20px; border-radius:10px;">Belum ada riwayat pertandingan untuk Mode ${currentMode} Player.</p>`;
                return;
            }

            let html = `
                <div class="standings-title" style="border-left-color: var(--purple); font-size: 1.3rem;">ALL TIME STANDING</div>
                <div style="overflow-x: auto; background: white; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-top: 15px;">
                <table class="glb-table">
                    <thead>
                        <tr>
                            <th style="width: 50px;">Pos</th>
                            <th class="align-left">Team</th>
                            <th>Pl</th><th>W</th><th>D</th><th>L</th><th>GF</th><th>GA</th><th>GD</th><th>Pts</th><th>Form</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${sortedData.map((p, index) => {
                            let formHtml = p.form.slice(-5).map(f => `<div class="form-circle form-${f.toLowerCase()}">${f}</div>`).join('');
                            if (p.form.length === 0) formHtml = `<span style="color:#aaa; font-size: 0.8rem;">No Data</span>`;
                            let rowClass = index < 3 ? 'glb-blue-bar' : '';
                            let icon = index === 0 ? '🏆' : '🎮';
                            return `
                            <tr>
                                <td><div class="${rowClass}"><span class="glb-pos">${index + 1}</span></div></td>
                                <td class="align-left"><div class="player-icon">${icon}</div>${p.name}</td>
                                <td>${p.pl}</td>
                                <td>${p.w}</td>
                                <td>${p.d}</td>
                                <td>${p.l}</td>
                                <td>${p.gf}</td>
                                <td>${p.ga}</td>
                                <td>${p.gd > 0 ? '+'+p.gd : p.gd}</td>
                                <td class="glb-pts">${p.pts}</td>
                                <td><div class="glb-form-container">${formHtml}</div></td>
                            </tr>
                            `;
                        }).join('')}
                    </tbody>
                </table>
                </div>
            `;
            document.getElementById('mainContent').innerHTML = html;
        });
    }

    function renderUlang(matches) {
        const content = document.getElementById('mainContent');
        content.innerHTML = "";
        
        if (!matches || typeof matches !== 'object') {
            content.innerHTML = `<p style="text-align:center; color:white; margin-top:30px; font-size:1.2rem; background:rgba(0,0,0,0.3); padding:20px; border-radius:10px;">Belum ada klasemen di bulan ${currentMonth} untuk Mode ${currentMode} Player.</p>`;
            return;
        }

        const sortedIds = Object.keys(matches).sort((a, b) => {
            return (matches[a].timestamp || 0) - (matches[b].timestamp || 0);
        });

        if (sortedIds.length === 0) {
            content.innerHTML = `<p style="text-align:center; color:white; margin-top:30px; font-size:1.2rem; background:rgba(0,0,0,0.3); padding:20px; border-radius:10px;">Belum ada klasemen di bulan ${currentMonth} untuk Mode ${currentMode} Player.</p>`;
            return;
        }

        let dateCounters = {};

        sortedIds.forEach(id => {
            const m = matches[id];
            if (!m || !m.standings || !Array.isArray(m.standings)) return;
            
            const statusEdit = (editingMatchId === id);
            
            if (!dateCounters[m.tanggal]) dateCounters[m.tanggal] = 1;
            else dateCounters[m.tanggal]++;
            const urutanLiga = dateCounters[m.tanggal];

            let displayStandings = [...m.standings];
            displayStandings.forEach(p => p.name = filterName(p.name));
            let cleanManualJuara = filterName(m.manualJuara);

            displayStandings.sort((a, b) => {
                if (cleanManualJuara) {
                    if (a.name === cleanManualJuara) return -1;
                    if (b.name === cleanManualJuara) return 1;
                }
                if (b.pts !== a.pts) return (b.pts || 0) - (a.pts || 0);
                return (a.manualRank || 99) - (b.manualRank || 99);
            });

            const pemenang = (displayStandings[0] && displayStandings[0].pts > 0) ? displayStandings[0].name : "-";

            content.innerHTML += `
                <div class="date-section">
                    <div class="date-header">
                        ${statusEdit ? 
                            `<select id="editTgl">${Array.from({length: 31}, (_, i) => `<option value="${i+1}" ${m.tanggal == i+1 ? 'selected' : ''}>Tgl ${i+1}</option>`).join('')}</select>` : 
                            `<h2>📅 ${getNamaHari(m.tanggal || 1)}, ${(m.tanggal || 1)} ${currentMonth} <span class="league-order-badge">LIGA ${urutanLiga}</span></h2>`
                        }
                        <div>
                            <span style="background:var(--accent); padding:5px 12px; border-radius:15px; font-weight:bold; font-size:0.8rem;">🏆 Juara: ${pemenang}</span>
                            ${modeAdmin && !statusEdit ? `<button onclick="hapusKlasemen('${id}')" style="margin-left:5px; border:none; background:none; cursor:pointer;">🗑️</button>` : ''}
                            ${modeAdmin ? `<button class="${statusEdit?'btn-save':'btn-edit'}" onclick="${statusEdit?`simpanData('${id}')`:`editData('${id}')`}" style="margin-left:5px;">${statusEdit?'Simpan':'Edit'}</button>` : ''}
                        </div>
                    </div>
                    
                    <div class="standings-title">STANDINGS</div>
                    
                    <table class="main-table">
                        <thead>
                            <tr>
                                <th>Player</th>
                                <th>Points</th>
                                <th>W</th><th>D</th><th>L</th>
                                <th>F</th><th>A</th><th>GD</th>
                                ${statusEdit?'<th>Posisi (Seri)</th>':''}
                            </tr>
                        </thead>
                        <tbody>
                            ${displayStandings.map((p, i) => {
                                const isJuara = (i === 0 && (p.pts || 0) > 0);
                                const valF = p.f || 0; const valA = p.a || 0; const valGD = p.gd || 0;
                                
                                return `<tr class="${isJuara ? 'winner-row' : ''}">
                                    <td style="text-align:left; padding-left:10px;"><strong>${p.name}</strong> ${isJuara?'👑':''}</td>
                                    <td class="col-pts">${p.pts || 0}</td>
                                    <td>${statusEdit?`<input type="number" class="w-in" data-name="${p.name}" value="${p.w || 0}">`:p.w || 0}</td>
                                    <td>${statusEdit?`<input type="number" class="d-in" data-name="${p.name}" value="${p.d || 0}">`:p.d || 0}</td>
                                    <td>${statusEdit?`<input type="number" class="l-in" data-name="${p.name}" value="${p.l || 0}">`:p.l || 0}</td>
                                    <td>${statusEdit?`<input type="number" class="f-in" data-name="${p.name}" value="${valF}">`:valF}</td>
                                    <td>${statusEdit?`<input type="number" class="a-in" data-name="${p.name}" value="${valA}">`:valA}</td>
                                    <td style="font-weight: bold; color: ${valGD > 0 ? 'green' : (valGD < 0 ? 'red' : 'black')};">${valGD > 0 ? '+' : ''}${valGD}</td>
                                    ${statusEdit ? `<td>
                                        <select class="rank-in" data-name="${p.name}" style="padding: 3px;">
                                            <option value="1" ${p.manualRank==1?'selected':''}>1</option>
                                            <option value="2" ${p.manualRank==2?'selected':''}>2</option>
                                            <option value="3" ${p.manualRank==3?'selected':''}>3</option>
                                            <option value="4" ${p.manualRank==4?'selected':''}>4</option>
                                        </select>
                                    </td>` : ''}
                                </tr>`;
                            }).join('')}
                        </tbody>
                    </table>
                </div>`;
        });
    }

    function editData(id) { editingMatchId = id; renderUlang(localData); }

    function simpanData(id) {
        const newTgl = document.getElementById('editTgl').value;
        const rowsW = document.querySelectorAll('.w-in');
        const rowsD = document.querySelectorAll('.d-in');
        const rowsL = document.querySelectorAll('.l-in');
        const rowsF = document.querySelectorAll('.f-in');
        const rowsA = document.querySelectorAll('.a-in');
        const rowsR = document.querySelectorAll('.rank-in');
        
        const standings = Array.from(rowsW).map((el, i) => {
            const name = el.getAttribute('data-name');
            const w = parseInt(el.value) || 0; const d = parseInt(rowsD[i].value) || 0; const l = parseInt(rowsL[i].value) || 0;
            const f = parseInt(rowsF[i].value) || 0; const a = parseInt(rowsA[i].value) || 0; const gd = f - a;
            const manualRank = parseInt(rowsR[i].value);
            return { name, w, d, l, f, a, gd, pts: (w * 3) + d, manualRank };
        });

        db.ref(dbPath + '/' + currentMonth + '/matches/' + id).update({
            tanggal: parseInt(newTgl), standings: standings, manualJuara: null
        }).then(() => { editingMatchId = null; ambilData(); });
    }

    function hapusKlasemen(id) { if(confirm("Hapus liga ini?")) db.ref(dbPath + '/' + currentMonth + '/matches/' + id).remove(); }

    function updateAllTimePointsAndStatus(monthlyMatches) {
        db.ref(dbPath).once('value', snapshot => {
            let ptsAll = {}; let trophyAllTime = {};
            let ptsMonth = {}; let trophyMonth = {};
            activePlayersInMode = new Set(); 
            
            const monthsData = snapshot.val() || {};
            
            Object.values(monthsData).forEach(m => {
                if(m && m.matches) {
                    Object.values(m.matches).forEach(match => {
                        if (!match || !match.standings || !Array.isArray(match.standings)) return;
                        
                        let s = [...match.standings].sort((a, b) => {
                            let cleanManualJuara = filterName(match.manualJuara);
                            if (cleanManualJuara) {
                                if (filterName(a.name) === cleanManualJuara) return -1;
                                if (filterName(b.name) === cleanManualJuara) return 1;
                            }
                            if (b.pts !== a.pts) return (b.pts || 0) - (a.pts || 0);
                            return (a.manualRank || 99) - (b.manualRank || 99);
                        });
                        
                        match.standings.forEach(p => {
                            let cleanName = filterName(p.name);
                            activePlayersInMode.add(cleanName); 
                            if (ptsAll[cleanName] === undefined) ptsAll[cleanName] = 0;
                            ptsAll[cleanName] += (p.pts || 0);
                        });
                        
                        if (s[0] && (s[0].pts || 0) > 0) {
                            let winnerName = filterName(s[0].name);
                            if (trophyAllTime[winnerName] === undefined) trophyAllTime[winnerName] = 0;
                            trophyAllTime[winnerName]++;
                        }
                    });
                }
            });
            
            if (monthlyMatches) {
                Object.values(monthlyMatches).forEach(match => {
                    if (!match || !match.standings || !Array.isArray(match.standings)) return;

                    let s = [...match.standings].sort((a, b) => {
                        let cleanManualJuara = filterName(match.manualJuara);
                        if (cleanManualJuara) {
                            if (filterName(a.name) === cleanManualJuara) return -1;
                            if (filterName(b.name) === cleanManualJuara) return 1;
                        }
                        if (b.pts !== a.pts) return (b.pts || 0) - (a.pts || 0);
                        return (a.manualRank || 99) - (b.manualRank || 99);
                    });
                    
                    match.standings.forEach(p => {
                        let cleanName = filterName(p.name);
                        if (ptsMonth[cleanName] === undefined) ptsMonth[cleanName] = 0;
                        ptsMonth[cleanName] += (p.pts || 0);
                    });
                    
                    if (s[0] && (s[0].pts || 0) > 0) {
                        let winnerName = filterName(s[0].name);
                        if (trophyMonth[winnerName] === undefined) trophyMonth[winnerName] = 0;
                        trophyMonth[winnerName]++;
                    }
                });
            }

            const displayList = modeAdmin ? allPlayers : Array.from(activePlayersInMode);
            let finalAllData = {}; let finalMonthData = {};
            displayList.forEach(p => { 
                finalAllData[p] = ptsAll[p] || 0; 
                finalMonthData[p] = ptsMonth[p] || 0;
            });

            const sortedAll = Object.entries(finalAllData).sort((a,b) => b[1] - a[1]);
            document.getElementById('allTimePointsBody').innerHTML = sortedAll.map(([n, p], i) => 
                `<tr><td style="text-align: left;">${i==0 && p>0?'👑':''} ${n}</td><td>${trophyAllTime[n] || 0}x 🏆</td><td style="font-weight:bold;">${p}</td></tr>`
            ).join('');

            const sortedMonth = Object.entries(finalMonthData).sort((a,b) => b[1] - a[1]);
            document.getElementById('totalPointsBody').innerHTML = sortedMonth.map(([n, p], i) => 
                `<tr><td style="text-align: left;">${i==0 && p>0?'👑':''} ${n}</td><td>${trophyMonth[n] || 0}x 🏆</td><td style="font-weight:bold;">${p}</td></tr>`
            ).join('');
            
            const sortedTrophiesMonth = Object.entries(trophyMonth).sort((a, b) => b[1] - a[1]);
            const championArea = document.getElementById('championArea');
            if (sortedTrophiesMonth.length > 0 && sortedTrophiesMonth[0][1] > 0) {
                const maxTrophies = sortedTrophiesMonth[0][1];
                const winners = sortedTrophiesMonth.filter(t => t[1] === maxTrophies).map(t => `${t[0]} (${t[1]}x 🏆)`);
                championArea.innerHTML = `🌟 CHAMPION ${currentMonth.toUpperCase()} 🌟<br>${winners.join(" & ")}`;
            } else {
                championArea.innerHTML = `Belum ada juara di bulan ${currentMonth}`;
            }

            renderStats(); 
        });
    }
</script>
</body>
</html>
